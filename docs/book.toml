[book]
title = "audiorouter"
authors = ["gw31415"]
description = "Cross-platform command-line audio router with a terminal UI"
language = "en"
src = "src"
multilingual = false

[output.html]
site-url = "https://audiorouter.amas.dev/"
default-theme = "ayu"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/gw31415/audiorouter"
edit-url-template = "https://github.com/gw31415/audiorouter/edit/main/docs/{path}"
additional-css = ["theme/custom.css"]
no-section-label = false
fold = { enable = true, level = 0 }

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
