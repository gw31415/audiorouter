[package]
name = "audiorouter"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = ">=1,<2"
clap = { version = ">=4,<5", features = ["derive"] }
colored = ">=2,<3"
cpal = ">=0.15,<0.16"
ctrlc = ">=3,<4"
dirs = ">=5,<7"
notify = ">=6,<7"
ringbuf = ">=0.4,<0.5"
serde = { version = ">=1,<2", features = ["derive"] }
toml = ">=0.8,<0.9"
tracing = ">=0.1,<0.2"
tracing-subscriber = { version = ">=0.3,<0.4", features = ["env-filter"] }
